<!DOCTYPE html>
<html>

<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050508;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1000px;
            height: 1000px;
            overflow: hidden;
        }

        .c {
            width: 1000px;
            height: 1000px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .t1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 110px;
            font-weight: 800;
            letter-spacing: 12px;
            background: linear-gradient(to right, #00e5ff, #7c3aed, #f0f0f5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            margin-top: 50px;
        }

        .t2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 20px;
            background: linear-gradient(to right, #00e5ff, #7c3aed, #f0f0f5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            margin-top: 15px;
            margin-left: 20px;
        }

        svg {
            width: 400px;
            height: 400px;
        }
    </style>
</head>

<body>
    <div class="c">
        <svg viewBox="0 0 32 32" fill="none">
            <defs>
                <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00e5ff" />
                    <stop offset="50%" stop-color="#7c3aed" />
                    <stop offset="100%" stop-color="#f0f0f5" />
                </linearGradient>
            </defs>
            <polygon points="16,2 28,9.5 28,22.5 16,30 4,22.5 4,9.5" stroke="url(#g)" stroke-width="2" />
            <polygon points="16,7 24,11.5 24,20.5 16,25 8,20.5 8,11.5" fill="rgba(0,229,255,0.08)" stroke="url(#g)"
                stroke-width="1" />
            <circle cx="16" cy="16" r="3" fill="url(#g)" />
            <line x1="16" y1="7" x2="16" y2="13" stroke="url(#g)" stroke-width="1" />
            <line x1="16" y1="19" x2="16" y2="25" stroke="url(#g)" stroke-width="1" />
            <line x1="24" y1="11.5" x2="19" y2="14.5" stroke="url(#g)" stroke-width="1" />
            <line x1="13" y1="17.5" x2="8" y2="20.5" stroke="url(#g)" stroke-width="1" />
            <line x1="8" y1="11.5" x2="13" y2="14.5" stroke="url(#g)" stroke-width="1" />
            <line x1="19" y1="17.5" x2="24" y2="20.5" stroke="url(#g)" stroke-width="1" />
        </svg>
        <div class="t1">PARLAQ</div>
        <div class="t2">AGENCY</div>
    </div>
</body>

</html>
